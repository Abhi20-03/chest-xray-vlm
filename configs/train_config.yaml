model_name: Qwen/Qwen2.5-VL-3B-Instruct
train_manifest: ../data/sample_manifest.jsonl
val_manifest: ../data/sample_manifest.jsonl
test_manifest:
output_dir: ../outputs/chest-vlm
prompt: Analyze this chest X-ray and provide a concise medical explanation of the findings.
max_length: 768
max_new_tokens: 192
image_size: 448
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
weight_decay: 0.01
num_train_epochs: 1
warmup_ratio: 0.03
logging_steps: 10
eval_steps: 50
save_steps: 50
save_total_limit: 2
gradient_checkpointing: true
bf16: true
fp16: false
seed: 42
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - up_proj
    - down_proj
    - gate_proj
